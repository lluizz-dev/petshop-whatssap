{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Vacinas</title>
    <link rel="stylesheet" href="{% static 'sistema_mensagem/style.css' %}">
    <link rel="stylesheet" href="{% static 'sistema_mensagem/login.css' %}">
</head>
<body>
    <div class="dashboard login-wrapper">
        <div class="dashboard-header">
            <h1>PetShop Vacinas</h1>
        </div>

        <div class="dashboard-content login-content">
            <div class="login-box">
                <p class="login-subtitle">Faça login para acessar o sistema</p>

                {% if form.errors %}
                    <div class="login-error">
                        ⚠️ Usuário ou senha incorretos. Tente novamente.
                    </div>
                {% endif %}

                <form method="POST" action="{% url 'login' %}">
                    {% csrf_token %}

                    <div class="form-group">
                        <label for="username">Usuário</label>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Digite seu usuário"
                            required
                            autofocus
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Senha</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Digite sua senha"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-cadastro btn-login-submit">
                        🔐 Entrar
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
