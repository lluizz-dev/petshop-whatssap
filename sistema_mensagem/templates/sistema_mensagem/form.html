{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ titulo }} - Petshop</title>
    <link rel="stylesheet" href="{% static 'sistema_mensagem/form.css' %}">
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1>{{ titulo }}</h1>
        </div>
        <div class="form-content">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">Salvar</button>
            </form>
            <a href="{% url 'cadastro_home' %}" class="back-link">⬅ Voltar</a>
        </div>
    </div>
</body>
</html>
